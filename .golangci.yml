version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - bodyclose
    - noctx
    - revive

  settings:
    revive:
      rules:
        - name: exported
          severity: warning

  exclusions:
    rules:
      # Test files may use assert without checking errors
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
