version: 2

project_name: skell

before:
  hooks:
    - go mod download
    - go mod verify

builds:
  - id: skell
    main: .
    binary: skell
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/aminmesbahi/skell/internal/version.Version={{.Version}} -X github.com/aminmesbahi/skell/internal/version.Commit={{.Commit}} -X github.com/aminmesbahi/skell/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  # Compressed archives for human download (skell_v0.1.0_linux_amd64.tar.gz etc.)
  - id: skell-archive
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  # Raw binaries for 'skell selfupdate' (skell_linux_amd64, skell_windows_amd64.exe etc.)
  - id: skell-binary
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: aminmesbahi
    name: skell
  draft: false
  prerelease: auto
