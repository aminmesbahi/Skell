name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 08:30 UTC
    - cron: "30 8 * * 1"

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── govulncheck: known Go CVEs ─────────────────────────────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ── nancy: OSS Index dependency audit ─────────────────────────────────────
  nancy:
    name: nancy (OSS Index)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install nancy
        run: go install github.com/sonatype-nexus-community/nancy@latest

      - name: Run nancy
        run: go list -json -deps ./... | nancy sleuth
        continue-on-error: true   # advisory only; does not block the build
