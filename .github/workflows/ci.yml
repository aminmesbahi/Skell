name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test (Go ${{ matrix.go }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.26"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  # ── 3. Build binaries ──────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-latest
          - goos: linux
            goarch: arm64
            runs-on: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runs-on: macos-latest
          - goos: darwin
            goarch: arm64
            runs-on: macos-latest
          - goos: windows
            goarch: amd64
            runs-on: windows-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X github.com/aminmesbahi/skell/internal/version.Version=${{ github.ref_name }}" -o dist/skell-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: skell-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  # ── 4. Build GUI (Windows) ─────────────────────────────────────────────────
  build-gui:
    name: Build GUI (windows/amd64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: gui/go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: gui
        run: bun install --cwd frontend

      - name: Build GUI
        working-directory: gui
        run: wails build -nsis -o Skell-windows-amd64.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: skell-gui-windows-amd64
          path: gui/build/bin/
          retention-days: 7
