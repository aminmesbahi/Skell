name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CLI — GoReleaser ───────────────────────────────────────────────────────
  release-cli:
    name: GoReleaser (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Desktop GUI — Windows ──────────────────────────────────────────────────
  release-gui-windows:
    name: Build & upload GUI (windows/amd64)
    runs-on: windows-latest
    needs: release-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: gui/go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: gui
        run: bun install --cwd frontend

      - name: Build GUI
        working-directory: gui
        run: wails build -o Skell-windows-amd64.exe

      - name: Build bundled Windows package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $versionNum = $version.TrimStart("v")
          $bundleDir = Join-Path $PWD "bundle"
          $cliZip = Join-Path $PWD "skell.zip"
          $bundleZip = Join-Path $PWD "skell_${versionNum}_windows_amd64_bundle.zip"
          $cliUrl = "https://github.com/${{ github.repository }}/releases/download/$version/skell_${versionNum}_windows_amd64.zip"

          Remove-Item -Path $bundleDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null

          $downloaded = $false
          for ($attempt = 1; $attempt -le 5 -and -not $downloaded; $attempt++) {
            try {
              Invoke-WebRequest -Uri $cliUrl -OutFile $cliZip -UseBasicParsing
              $downloaded = $true
            } catch {
              if ($attempt -eq 5) { throw }
              Start-Sleep -Seconds 5
            }
          }

          Expand-Archive -Path $cliZip -DestinationPath $bundleDir -Force
          Copy-Item "gui/build/bin/Skell-windows-amd64.exe" (Join-Path $bundleDir "skell-gui.exe") -Force
          Compress-Archive -Path (Join-Path $bundleDir "skell.exe"), (Join-Path $bundleDir "skell-gui.exe") -DestinationPath $bundleZip -Force

      - name: Upload GUI to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            gui/build/bin/Skell-windows-amd64.exe
            skell_*_windows_amd64_bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
